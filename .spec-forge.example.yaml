# Spec Forge Example Configuration
# Copy this file to .spec-forge.yaml and customize as needed

# Enrichment Settings
enrich:
  enabled: true
  # LLM provider: openai, anthropic, ollama, custom
  provider: custom
  # Model to use for enrichment
  model: deepseek-chat
  # Base URL for custom/ollama providers
  baseUrl: https://api.deepseek.com/v1
  # Environment variable name for API key (default: LLM_API_KEY)
  apiKeyEnv: LLM_API_KEY
  # Language for generated descriptions: en, zh
  language: zh
  # Request timeout
  timeout: 60s
  # Custom prompt templates (optional)
  # Override built-in prompt templates for any type: api, schema, param, response
  # Supports Go template syntax (same as built-in templates)
  # customPrompts:
  #   api:
  #     system: "You are a REST API documentation writer..."
  #     user: "API: {{.Method}} {{.Path}}\nDescribe this endpoint."
  #   schema:
  #     system: "You are a data model documenter..."
  #     user: "Schema: {{.SchemaName}}\nDescribe this data model and its fields."

# Output Settings
output:
  # Output directory for generated OpenAPI specs
  dir: ./output
  # Output format: yaml or json
  format: yaml
