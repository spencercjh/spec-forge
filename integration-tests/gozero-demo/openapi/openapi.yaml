components: {}
info:
    title: User Management API
    version: 1.0.0
openapi: 3.0.3
paths:
    /api/v1/users:
        get:
            description: This endpoint returns a paginated list of user records from the system. By default, it provides basic user information, and the results can be filtered or sorted using query parameters. It is typically used for user management and lookup operations.
            operationId: listUsersHandler
            parameters:
                - description: The page number to retrieve, starting from 1.
                  in: query
                  name: page
                  required: true
                  schema:
                    default: 0
                    type: integer
                - description: The size of the item or result set to be returned.
                  in: query
                  name: size
                  required: true
                  schema:
                    default: 10
                    type: integer
                - description: The unique identifier for the user account. If not provided, the system may use a default or derive it from other context.
                  in: query
                  name: username
                  schema:
                    allowEmptyValue: true
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        type: integer
                                    data:
                                        properties:
                                            content:
                                                items:
                                                    properties:
                                                        age:
                                                            type: integer
                                                        email:
                                                            type: string
                                                        fullName:
                                                            type: string
                                                        id:
                                                            type: integer
                                                        username:
                                                            type: string
                                                    required:
                                                        - id
                                                        - username
                                                        - email
                                                        - fullName
                                                        - age
                                                    type: object
                                                type: array
                                            pageNumber:
                                                type: integer
                                            pageSize:
                                                type: integer
                                            total:
                                                type: integer
                                            totalPages:
                                                type: integer
                                        required:
                                            - content
                                            - pageNumber
                                            - pageSize
                                            - total
                                            - totalPages
                                        type: object
                                    message:
                                        type: string
                                type: object
                    description: ""
            summary: ListUsersHandler
        post:
            description: Registers a new user in the system. The request must include the required user information, such as name and email. Upon successful creation, the endpoint typically returns the details of the newly created user.
            operationId: createUserHandler
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                age:
                                    type: integer
                                email:
                                    type: string
                                fullName:
                                    type: string
                                username:
                                    type: string
                            required:
                                - username
                                - email
                                - fullName
                                - age
                            type: object
                required: true
                x-originalParamName: body
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        type: integer
                                    data:
                                        properties:
                                            age:
                                                type: integer
                                            email:
                                                type: string
                                            fullName:
                                                type: string
                                            id:
                                                type: integer
                                            username:
                                                type: string
                                        required:
                                            - id
                                            - username
                                            - email
                                            - fullName
                                            - age
                                        type: object
                                    message:
                                        type: string
                                type: object
                    description: ""
            summary: CreateUserHandler
    /api/v1/users/{id}:
        get:
            description: This endpoint fetches the detailed profile information for a single user. The user is identified by the unique ID provided in the URL path. If the user exists, their data is returned; otherwise, a 404 error is sent.
            operationId: getUserHandler
            parameters:
                - description: Unique identifier for the resource.
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        type: integer
                                    data:
                                        properties:
                                            age:
                                                type: integer
                                            email:
                                                type: string
                                            fullName:
                                                type: string
                                            id:
                                                type: integer
                                            username:
                                                type: string
                                        required:
                                            - id
                                            - username
                                            - email
                                            - fullName
                                            - age
                                        type: object
                                    message:
                                        type: string
                                type: object
                    description: ""
            summary: GetUserHandler
    /api/v1/users/{id}/profile:
        post:
            description: This endpoint allows you to modify the profile details of an existing user identified by their unique ID. The request should include the profile fields to be updated in the request body. The system will validate and apply the changes, returning the updated profile information upon success.
            operationId: updateProfileHandler
            parameters:
                - description: Unique identifier for the resource.
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            properties:
                                age:
                                    allowEmptyValue: true
                                    type: integer
                                    x-formData-name: age
                                email:
                                    allowEmptyValue: true
                                    type: string
                                    x-formData-name: email
                                fullName:
                                    allowEmptyValue: true
                                    type: string
                                    x-formData-name: fullName
                            type: object
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        type: integer
                                    data:
                                        properties:
                                            age:
                                                type: integer
                                            email:
                                                type: string
                                            fullName:
                                                type: string
                                            id:
                                                type: integer
                                            username:
                                                type: string
                                        required:
                                            - id
                                            - username
                                            - email
                                            - fullName
                                            - age
                                        type: object
                                    message:
                                        type: string
                                type: object
                    description: ""
            summary: UpdateProfileHandler
    /api/v1/users/upload:
        post:
            description: This endpoint allows clients to upload user-related data or files to the system. It accepts multipart/form-data or a structured payload, depending on the implementation. Successful uploads are processed asynchronously, and the response typically includes a status or reference ID.
            operationId: uploadFileHandler
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        type: integer
                                    data:
                                        properties:
                                            contentType:
                                                type: string
                                            filename:
                                                type: string
                                            message:
                                                type: string
                                            size:
                                                type: integer
                                        required:
                                            - filename
                                            - size
                                            - contentType
                                            - message
                                        type: object
                                    message:
                                        type: string
                                type: object
                    description: ""
            summary: UploadFileHandler
