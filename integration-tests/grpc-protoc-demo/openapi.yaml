openapi: 3.1.0
info:
  title: demo.user
paths:
  /demo.user.UserService/CreateUser:
    post:
      tags:
        - demo.user.UserService
      summary: CreateUser
      description: Create a new user
      operationId: demo.user.UserService.CreateUser
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/demo.user.CreateUserRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/demo.user.CreateUserResponse'
  /demo.user.UserService/GetUser:
    post:
      tags:
        - demo.user.UserService
      summary: GetUser
      description: Get a user by their ID
      operationId: demo.user.UserService.GetUser
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/demo.user.GetUserRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/demo.user.GetUserResponse'
  /demo.user.UserService/ListUsers:
    post:
      tags:
        - demo.user.UserService
      summary: ListUsers
      description: List users with pagination and optional filtering
      operationId: demo.user.UserService.ListUsers
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/demo.user.ListUsersRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/demo.user.ListUsersResponse'
  /demo.user.UserService/UpdateProfile:
    post:
      tags:
        - demo.user.UserService
      summary: UpdateProfile
      description: Update user profile information
      operationId: demo.user.UserService.UpdateProfile
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/demo.user.UpdateProfileRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/demo.user.UpdateProfileResponse'
  /demo.user.UserService/UploadFile:
    post:
      tags:
        - demo.user.UserService
      summary: UploadFile
      description: Upload a file for a user
      operationId: demo.user.UserService.UploadFile
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/demo.user.UploadFileRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/demo.user.UploadFileResponse'
components:
  schemas:
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    demo.common.ApiResponse:
      type: object
      properties:
        code:
          type: integer
          title: code
          format: int32
          description: Response status code
        message:
          type: string
          title: message
          description: Response message
        success:
          type: boolean
          title: success
          description: Whether the request was successful
      title: ApiResponse
      additionalProperties: false
      description: Generic API response wrapper
    demo.common.FileInfo:
      type: object
      properties:
        filename:
          type: string
          title: filename
          description: Original filename
        size:
          type:
            - integer
            - string
          title: size
          format: int64
          description: File size in bytes
        contentType:
          type: string
          title: content_type
          description: MIME content type
      title: FileInfo
      additionalProperties: false
      description: File upload information
    demo.common.PageMetadata:
      type: object
      properties:
        page:
          type: integer
          title: page
          format: int32
          description: Current page number
        size:
          type: integer
          title: size
          format: int32
          description: Number of items per page
        total:
          type: integer
          title: total
          format: int32
          description: Total number of items
        totalPages:
          type: integer
          title: total_pages
          format: int32
          description: Total number of pages
      title: PageMetadata
      additionalProperties: false
      description: Pagination metadata for list responses
    demo.common.PageRequest:
      type: object
      properties:
        page:
          type: integer
          title: page
          format: int32
          description: Page number (0-indexed)
        size:
          type: integer
          title: size
          format: int32
          description: Number of items per page
      title: PageRequest
      additionalProperties: false
      description: Pagination parameters for list requests
    demo.user.CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          title: username
          description: Username for the new user
        email:
          type: string
          title: email
          description: Email address
        fullName:
          type: string
          title: full_name
          description: Full display name
        age:
          type: integer
          title: age
          format: int32
          description: Age in years
      title: CreateUserRequest
      additionalProperties: false
      description: Request to create a new user
    demo.user.CreateUserResponse:
      type: object
      properties:
        user:
          title: user
          description: The newly created user
          $ref: '#/components/schemas/demo.user.User'
        status:
          title: status
          description: Response status
          $ref: '#/components/schemas/demo.common.ApiResponse'
      title: CreateUserResponse
      additionalProperties: false
      description: Response containing the created user
    demo.user.GetUserRequest:
      type: object
      properties:
        id:
          type:
            - integer
            - string
          title: id
          format: int64
          description: User ID to retrieve
      title: GetUserRequest
      additionalProperties: false
      description: Request to get a user by ID
    demo.user.GetUserResponse:
      type: object
      properties:
        user:
          title: user
          description: The requested user
          $ref: '#/components/schemas/demo.user.User'
        status:
          title: status
          description: Response status
          $ref: '#/components/schemas/demo.common.ApiResponse'
      title: GetUserResponse
      additionalProperties: false
      description: Response containing a single user
    demo.user.ListUsersRequest:
      type: object
      properties:
        page:
          title: page
          description: Pagination parameters
          $ref: '#/components/schemas/demo.common.PageRequest'
        usernameFilter:
          type: string
          title: username_filter
          description: Optional username filter (partial match)
      title: ListUsersRequest
      additionalProperties: false
      description: Request to list users with optional filtering
    demo.user.ListUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/demo.user.User'
          title: users
          description: List of users on the current page
        page:
          title: page
          description: Pagination metadata
          $ref: '#/components/schemas/demo.common.PageMetadata'
        status:
          title: status
          description: Response status
          $ref: '#/components/schemas/demo.common.ApiResponse'
      title: ListUsersResponse
      additionalProperties: false
      description: Response containing a list of users
    demo.user.UpdateProfileRequest:
      type: object
      properties:
        id:
          type:
            - integer
            - string
          title: id
          format: int64
          description: User ID to update
        fullName:
          type: string
          title: full_name
          description: New full name (optional)
        email:
          type: string
          title: email
          description: New email (optional)
        age:
          type: integer
          title: age
          format: int32
          description: New age (optional)
      title: UpdateProfileRequest
      additionalProperties: false
      description: Request to update user profile
    demo.user.UpdateProfileResponse:
      type: object
      properties:
        user:
          title: user
          description: The updated user
          $ref: '#/components/schemas/demo.user.User'
        status:
          title: status
          description: Response status
          $ref: '#/components/schemas/demo.common.ApiResponse'
      title: UpdateProfileResponse
      additionalProperties: false
      description: Response containing the updated user
    demo.user.UploadFileRequest:
      type: object
      properties:
        userId:
          type:
            - integer
            - string
          title: user_id
          format: int64
          description: User ID (optional)
        fileInfo:
          title: file_info
          description: File information
          $ref: '#/components/schemas/demo.common.FileInfo'
        content:
          type: string
          title: content
          format: byte
          description: File content (binary)
      title: UploadFileRequest
      additionalProperties: false
      description: Request to upload a file for a user
    demo.user.UploadFileResponse:
      type: object
      properties:
        message:
          type: string
          title: message
          description: Upload result message
        status:
          title: status
          description: Response status
          $ref: '#/components/schemas/demo.common.ApiResponse'
      title: UploadFileResponse
      additionalProperties: false
      description: Response for file upload
    demo.user.User:
      type: object
      properties:
        id:
          type:
            - integer
            - string
          title: id
          format: int64
          description: Unique identifier for the user
        username:
          type: string
          title: username
          description: Username for login
        email:
          type: string
          title: email
          description: Email address
        fullName:
          type: string
          title: full_name
          description: Full display name
        age:
          type: integer
          title: age
          format: int32
          description: Age in years
      title: User
      additionalProperties: false
      description: User entity representing a user in the system
security: []
tags:
  - name: demo.user.UserService
    description: UserService provides user management operations
