syntax = "proto3";

package google.api;

option go_package = "google.golang.org/genproto/googleapis/api/annotations;annotations";
option java_multiple_files = true;
option java_outer_classname = "HttpProto";
option java_package = "com.google.api";
option objc_class_prefix = "GAPI";

// Defines the HTTP configuration for an API service. It contains a list of
// [HttpRule][google.api.HttpRule], each specifying the mapping of an RPC method
// to one or more HTTP REST API methods.
message Http {
  // A list of HTTP configuration rules that apply to individual API methods.
  //
  // **NOTE:** All service configuration rules follow "last one wins" order.
  repeated HttpRule rules = 1;

  // When disable_google_path_encoding is set to true, the path encoding
  // will use the raw path passed in.
  bool disable_google_path_encoding = 2;
}

// gRPC Transcoding
//
// gRPC Transcoding is a feature for converting between a gRPC method and one or more
// HTTP REST endpoints. It allows developers to build a single API service that supports
// both gRPC APIs and REST APIs. Many systems, including [Google
// APIs](https://github.com/googleapis/googleapis),
// [Cloud Endpoints](https://cloud.google.com/endpoints), [gRPC-Gateway](https://github.com/grpc-ecosystem/grpc-gateway),
// and [Envoy](https://github.com/envoyproxy/envoy) proxy support this feature and use it for external API serving.
//
// gRPC Transcoding works by mapping HTTP/JSON requests to gRPC methods based on
// the configuration in the [HttpRule][google.api.HttpRule] proto message.
//
// # HttpRule
//
// The `HttpRule` message defines the mapping of an RPC method to one or more HTTP
// REST API methods. The mapping specifies how different portions of the RPC request
// message are mapped to the URL path, URL query parameters, and HTTP request body.
//
// The mapping is typically specified as an `google.api.http` annotation on the RPC method
// inside the `.proto` file.
//
// Example:
//
//     package google.example.library.v1;
//
//     service LibraryService {
//       rpc GetBook(GetBookRequest) returns (Book) {
//         option (google.api.http) = {
//           get: "/v1/{name=shelves/*/books/*}"
//         };
//       }
//     }
//
// This enables an HTTP REST to gRPC mapping as below:
//
// HTTP | gRPC
// -----|-----
// `GET /v1/shelves/shelf1/books/book2` | `GetBook(name: "shelves/shelf1/books/book2")`
//
// Any fields in the request message which are not bound by the path template
// automatically become HTTP query parameters if they are not the request body.
message HttpRule {
  // Selects a method to which this rule applies.
  //
  // Refer to [selector][google.api.DocumentationRule.selector] for syntax details.
  string selector = 1;

  // Determines the URL pattern is matched by this rules. This pattern can be used with
  // any of the {get|put|post|delete|patch} methods. A custom method can be defined using
  // the 'custom' field.
  oneof pattern {
    // Maps to HTTP GET. Used for listing and getting information about
    // resources.
    string get = 2;

    // Maps to HTTP PUT. Used for replacing a resource.
    string put = 3;

    // Maps to HTTP POST. Used for creating a resource or performing an action.
    string post = 4;

    // Maps to HTTP DELETE. Used for deleting a resource.
    string delete = 5;

    // Maps to HTTP PATCH. Used for updating a resource.
    string patch = 6;

    // The custom pattern is used for specifying an HTTP method that is not
    // included in the `pattern` field, such as PUT, or the user-created
    // HTTP method. The custom method must match the pattern: `"[A-Z]+".`
    CustomHttpPattern custom = 8;
  }

  // The name of the request field whose value is mapped to the HTTP request
  // body, or `*` for mapping all request fields not captured by the path
  // pattern to the HTTP body, or omitted for not having any HTTP request body.
  //
  // NOTE: the referred field must be present at the top-level of the request
  // message type.
  string body = 7;

  // Optional. The name of the response field whose value is mapped to the HTTP
  // response body. When omitted, the whole response message is used as the
  // HTTP response body.
  string response_body = 12;

  // Additional HTTP bindings for the selector. Nested bindings must
  // not contain an `additional_bindings` field themselves (that is,
  // the nesting may only be one level deep).
  repeated HttpRule additional_bindings = 11;
}

// A custom pattern is used for defining custom HTTP verb.
message CustomHttpPattern {
  // The name of this custom HTTP verb.
  string kind = 1;

  // The path matched by this custom verb.
  string path = 2;
}
