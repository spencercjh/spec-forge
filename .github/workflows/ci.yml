name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Verify dependencies are tidy
        run: git diff --exit-code -- go.mod go.sum

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10
          verify: false

      - name: Format check
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: true

      - name: Build binary
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spec-forge-linux
          path: build/spec-forge
          retention-days: 7

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: true

      - name: Set up goctl
        run: go install github.com/zeromicro/go-zero/tools/goctl@latest

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Set up Protoc
        uses: arduino/setup-protoc@v3

      - name: Set up protoc-gen-connect-openapi
        run: go install github.com/sudorandom/protoc-gen-connect-openapi@latest

      - name: Run E2E tests
        run: make test-e2e
