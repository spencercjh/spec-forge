name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Verify dependencies are tidy
        run: git diff --exit-code -- go.mod go.sum

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10
          args: --help
          verify: false

      - name: Format check
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build binary
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spec-forge-linux
          path: build/spec-forge
          retention-days: 7

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        test-type: [ maven, gradle ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Maven
        if: matrix.test-type == 'maven'
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Setup Gradle
        if: matrix.test-type == 'gradle'
        uses: gradle/actions/setup-gradle@v4

      - name: Run E2E tests (${{ matrix.test-type }})
        run: make test-e2e
